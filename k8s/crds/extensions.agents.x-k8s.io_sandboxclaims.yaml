---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: sandboxclaims.extensions.agents.x-k8s.io
spec:
  group: extensions.agents.x-k8s.io
  names:
    kind: SandboxClaim
    listKind: SandboxClaimList
    plural: sandboxclaims
    shortNames:
    - sandboxclaim
    singular: sandboxclaim
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SandboxClaim is the Schema for the sandbox Claim API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Sandbox
            properties:
              additionalPodMetadata:
                description: |-
                  additionalPodMetadata defines the labels and annotations to be propagated to the Sandbox Pod.
                  Label values are limited to 63 characters and must match Kubernetes label value patterns.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: |-
                      annotations is an unstructured key value map stored with a resource that may be
                      set by external tools to store and retrieve arbitrary metadata. They are not
                      queryable and should be preserved when modifying objects.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: |-
                      labels defines the map of string keys and values that can be used to organize and categorize
                      (scope and select) objects. May match selectors of replication controllers
                      and services.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels
                    type: object
                type: object
              env:
                description: env is a list of environment variables to inject into
                  the sandbox
                items:
                  description: EnvVar represents a custom environment variable key-value
                    pair.
                  properties:
                    containerName:
                      description: |-
                        containerName specifies the target container for the environment variable.
                        If not specified, it defaults to the first container defined in the template.
                      type: string
                    name:
                      description: name of the environment variable.
                      type: string
                    value:
                      description: value of the environment variable.
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
                x-kubernetes-list-type: atomic
              lifecycle:
                description: lifecycle defines when and how the SandboxClaim should
                  be shut down.
                properties:
                  shutdownPolicy:
                    default: Retain
                    description: shutdownPolicy determines the behavior when the SandboxClaim
                      expires.
                    enum:
                    - Delete
                    - DeleteForeground
                    - Retain
                    type: string
                  shutdownTime:
                    description: |-
                      shutdownTime is the absolute time when the SandboxClaim expires.
                      This time governs the lifecycle of the claim. It is not propagated to the
                      underlying Sandbox. Instead, the SandboxClaim controller enforces this
                      expiration by deleting the Sandbox resources when the time is reached.
                      If this field is omitted or set to nil, the SandboxClaim itself won't expire.
                      This implies unsetting a Sandbox's ShutdownTime via SandboxClaim isn't supported.
                    format: date-time
                    type: string
                type: object
              sandboxTemplateRef:
                description: sandboxTemplateRef defines the name of the SandboxTemplate
                  to be used for creating a Sandbox.
                properties:
                  name:
                    description: name of the SandboxTemplate
                    type: string
                required:
                - name
                type: object
              warmpool:
                default: default
                description: |-
                  warmpool specifies the warm pool policy for sandbox adoption.
                  - "none": Do not use any warm pool, always create fresh sandboxes
                  - "default": Use default behavior, select from all matching warm pools (default)
                  - A warm pool name: Select only from the specified warm pool (e.g., "fast-pool", "secure-pool")
                type: string
            required:
            - sandboxTemplateRef
            type: object
          status:
            description: status defines the observed state of Sandbox
            properties:
              conditions:
                description: conditions represent the latest available observations
                  of a Sandbox's current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              sandbox:
                description: sandbox defines the state of Sandbox
                properties:
                  name:
                    description: name is the name of the Sandbox created from this
                      claim
                    type: string
                  podIPs:
                    description: |-
                      podIPs are the IP addresses of the underlying pod.
                      A pod may have multiple IPs in dual-stack clusters.
                    items:
                      type: string
                    type: array
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
