namespace:
  # create controls whether the namespace is created by this chart.
  create: true
  name: agent-sandbox-system

image:
  repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
  tag: ""  # required, eg. v0.3.10
  pullPolicy: IfNotPresent

replicaCount: 1

controller:
  ##### Unset flags are omitted
  # clusterDomain: "cluster.local"
  leaderElect: true
  # leaderElectionNamespace: ""
  extensions: false
  # enableTracing: false
  # enablePprof: false
  # enablePprofDebug: false
  # pprofBlockProfileRate: 1000000
  # pprofMutexProfileFraction: 10
  # kubeApiQps: -1.0
  # kubeApiBurst: 10
  # sandboxConcurrentWorkers: 1
  ##### The following workers are only active when controller.extensions=true.
  # sandboxClaimConcurrentWorkers: 1
  # sandboxWarmPoolConcurrentWorkers: 1
  # sandboxTemplateConcurrentWorkers: 1
  ##### extraArgs passes additional flags not listed above (e.g. zap logging flags).
  extraArgs: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 128Mi
  # requests:
  #   cpu: 10m
  #   memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Pod-level securityContext (spec.template.spec.securityContext). Default null — unset in the manifest unless you set this.
# Example for Kyverno / restricted Pod Security:
# podSecurityContext:
#   runAsNonRoot: true
#   seccompProfile:
#     type: RuntimeDefault
podSecurityContext: null

# Container-level securityContext for the controller. Default null — applied only when set.
# Example:
# containerSecurityContext:
#   allowPrivilegeEscalation: false
#   capabilities:
#     drop:
#       - ALL
#   runAsNonRoot: true
#   seccompProfile:
#     type: RuntimeDefault
containerSecurityContext: null
