name: Presubmit Tests

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache golangci-lint
        uses: actions/cache@v4
        with:
          path: dev/tools/tmp/bin/golangci-kube-api-linter
          key: golangci-kube-api-linter-${{ hashFiles('dev/tools/.custom-gcl.yaml', 'dev/tools/go.mod') }}

      - name: Build golangci-kube-api-linter (if not cached)
        run: ./dev/tools/build-kal

      - name: Run lint-go
        run: ./dev/ci/presubmits/lint-go

      - name: Run lint-api
        run: ./dev/ci/presubmits/lint-api
