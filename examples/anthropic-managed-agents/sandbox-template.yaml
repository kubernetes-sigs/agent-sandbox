apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: claude-agent-worker
spec:
  podTemplate:
    metadata:
      labels:
        app: claude-agent-worker
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: claude-agent-worker
      runtimeClassName: gvisor
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: sandbox.gke.io/runtime
          operator: Equal
          value: gvisor
          effect: NoSchedule
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          # ant CLI + bash/tar/unzip/node22 + a :8080 listener that execs `ant beta:worker run` after dispatch.
          image: REGION-docker.pkg.dev/PROJECT_ID/anthropic-agents/claude-agent-worker:TAG
          ports:
            - name: dispatch
              containerPort: 8080
          workingDir: /workspace
          env:
            - name: ANTHROPIC_ENVIRONMENT_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-environment-key
                  key: latest
            - name: ANTHROPIC_ENVIRONMENT_ID
              valueFrom:
                configMapKeyRef:
                  name: anthropic-env
                  key: environment_id
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: session
              mountPath: /mnt/session
            - name: session-outputs-gcs
              mountPath: /mnt/gcs
            - name: tmp
              mountPath: /tmp
          resources:
            requests: {cpu: "500m", memory: "1Gi"}
            limits:   {cpu: "2",    memory: "4Gi"}
      volumes:
        - name: workspace
          emptyDir: {}
        - name: session
          emptyDir: {}
        - name: session-outputs-gcs
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: PROJECT_ID-claude-session-outputs
              mountOptions: implicit-dirs,uid=1000,gid=1000
              skipCSIBucketAccessCheck: "true"
        - name: tmp
          emptyDir: {}
---
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: claude-agent-worker
spec:
  sandboxTemplateRef:
    name: claude-agent-worker
  replicas: 2
