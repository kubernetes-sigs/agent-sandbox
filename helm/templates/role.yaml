{{- $watchNamespaces := include "agent-sandbox.watchNamespaces" . | fromJsonArray -}}
{{- $controllerNamespace := include "agent-sandbox.namespace" . -}}
{{- $controllerNamespaceWatched := has $controllerNamespace $watchNamespaces -}}
{{- if or (not .Values.controller.watchNamespace) $controllerNamespaceWatched }}
{{/*
Role for the agent-sandbox-controller in the release namespace.
In cluster-scoped mode: grants webhook certificate management permissions.
In namespaced mode: includes workload RBAC from generated files when the
controller namespace is watched.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-sandbox-controller
  namespace: {{ $controllerNamespace }}
  labels:
    {{- include "agent-sandbox.labels" . | nindent 4 }}
rules:
{{- if not .Values.controller.watchNamespace }}
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
- apiGroups:
  - ""
  resourceNames:
  - agent-sandbox-webhook-certs
  resources:
  - secrets
  verbs:
  - get
  - patch
  - update
{{- else }}
{{ .Files.Get "files/rbac.namespaced.generated.yaml" -}}
{{- if .Values.controller.extensions }}
{{ .Files.Get "files/extensions-rbac.namespaced.generated.yaml" -}}
{{- end }}
{{- end }}
{{- end }}
