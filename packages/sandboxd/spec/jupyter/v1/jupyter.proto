syntax = "proto3";

package jupyter.v1;

option go_package = "sigs.k8s.io/agent-sandbox/packages/sandboxd/spec/jupyter;jupyter";
option java_multiple_files = true;
option java_package = "io.sandboxd.packages.sandboxd.spec.jupyter";

enum KernelStatus {
  KERNEL_STATUS_UNSPECIFIED = 0;
  KERNEL_STATUS_STARTING = 1;
  KERNEL_STATUS_IDLE = 2;
  KERNEL_STATUS_BUSY = 3;
  KERNEL_STATUS_ERROR = 4;
}

service JupyterService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc ExecuteCode(ExecuteCodeRequest) returns (stream ExecuteCodeResponse);
}

message CreateSessionRequest {
  string kernel_name = 1;
}

message CreateSessionResponse {
  string session_id = 1;
  KernelStatus status = 2;
}

message ExecuteCodeRequest {
  string session_id = 1;
  string code = 2;
}

message StreamEvent {
  string stdout = 1;
  string stderr = 2;
}

message StatusEvent {
  KernelStatus status = 1;
}

message ExecuteCodeResponse {
  oneof event {
    StreamEvent stream = 1;
    JupyterOutput output = 2;
    StatusEvent status = 3;
  }
}

message JupyterOutput {
  string type = 1;
  bytes data = 2;
}

