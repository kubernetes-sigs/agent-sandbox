apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: sandboxwarmpool-example
spec:
  updateStrategy:
    type: Recreate
  # replicas is optional; defaults to 1 when omitted. Set explicitly to 0 for an empty pool.
  sandboxTemplateRef:
    # This name must exactly match the 'metadata.name' of your SandboxTemplate.
    name: secure-datascience-template