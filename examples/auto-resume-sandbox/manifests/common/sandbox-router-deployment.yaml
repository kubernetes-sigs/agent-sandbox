apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-router
  namespace: default
  labels:
    app: sandbox-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sandbox-router
  template:
    metadata:
      labels:
        app: sandbox-router
    spec:
      serviceAccountName: sandbox-router-sa
      containers:
      - name: sandbox-router
        image: sandbox-router:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
          name: grpc-ext-proc
        env:
        - name: PORT
          value: "50051"
        - name: MANAGER_ENDPOINT
          value: "http://sandbox-suspension-manager-svc:8090/v1/sandboxes/resume"
---
apiVersion: v1
kind: Service
metadata:
  name: sandbox-router-svc
  namespace: default
spec:
  selector:
    app: sandbox-router
  ports:
  - name: grpc-ext-proc
    appProtocol: kubernetes.io/h2c
    port: 50051
    targetPort: 50051
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-router-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-router-cluster-role
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["agents.x-k8s.io"]
  resources: ["sandboxes"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-router-cluster-binding
subjects:
- kind: ServiceAccount
  name: sandbox-router-sa
  namespace: default
- kind: ServiceAccount
  name: sandbox-router-sa
  namespace: tenant-a
- kind: ServiceAccount
  name: sandbox-router-sa
  namespace: tenant-b
roleRef:
  kind: ClusterRole
  name: sandbox-router-cluster-role
  apiGroup: rbac.authorization.k8s.io

