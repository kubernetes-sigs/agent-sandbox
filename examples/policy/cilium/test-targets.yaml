# Test targets used by the verification steps in README §6.
#
# Deploys traefik/whoami: a tiny HTTP server that echoes the request headers
# back in the response body. Useful for two demos:
#
#   - SAND-EGRESS-4a (CIDR + port). Sandbox attempts to reach `echo` directly
#     (no proxy). Without an allow rule, the default-deny floor blocks the
#     connection; allowlist-cidr.yaml opens it specifically.
#
#   - SAND-AUTH-1 (per-request injection). Sandbox calls `echo` through the
#     Squid proxy on plaintext HTTP. Squid's request_header_add directive
#     injects an Authorization header. Whoami echoes the headers back, so we
#     can SEE that the Authorization header arrived without the sandbox ever
#     having had the credential.
#
# Apply this only when running the verify steps. Not part of the production
# pattern.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo
  namespace: agent-sandbox-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
  template:
    metadata:
      labels:
        app: echo
    spec:
      containers:
        - name: whoami
          image: traefik/whoami:v1.10
          args:
            - "--port=80"
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: echo
  namespace: agent-sandbox-demo
spec:
  selector:
    app: echo
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
