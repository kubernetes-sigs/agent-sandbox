# ValidatingAdmissionPolicy that rejects any SandboxTemplate whose
# spec.networkPolicy.egress permits public-internet egress
# (ipBlock.cidr == 0.0.0.0/0 or ::/0), in either IPv4 or IPv6.
#
# Covers: CUJ SAND-EGRESS-5 (admin wants to disallow public egress at
# admission time) from examples/policy/cilium/requirements.md.
#
# Why this is the right layer:
#   Cilium and NetworkPolicy enforce traffic at packet time; they have no
#   opinion on which policies users are allowed to create. Stopping a
#   misconfiguration at submission time prevents it from ever being applied,
#   and is much cheaper than relying on runtime enforcement to clean up.
#
# Scope and limits of this specific policy:
#   - Validates SandboxTemplate only. Sibling policies for raw
#     NetworkPolicy, CiliumNetworkPolicy, CiliumClusterwideNetworkPolicy, and
#     FQDNNetworkPolicy can follow the same shape — each Kind needs its own
#     ValidatingAdmissionPolicy because CEL can't usefully match across
#     unrelated schemas.
#   - Strict reading of "no public egress": ANY rule allowing 0.0.0.0/0 (or
#     ::/0) is rejected, even with `except:` ranges that narrow it. The
#     intent is that public-bound traffic must go through a forward proxy
#     (see examples/policy/cilium/egress-gateway.yaml) rather than the
#     SandboxTemplate's built-in egress.
#   - A more permissive variant — allow 0.0.0.0/0 only when `except:`
#     covers RFC1918 + the metadata server — is a one-line CEL change; see
#     the alternative expression in the comments below.
#
# Pairs with restrict-template-egress-binding.yaml, which scopes the policy
# to namespaces labeled `agent-sandbox.x-k8s.io/restrict-public-egress=true`.
# Without that label on the namespace, the policy doesn't apply — so
# enabling it is an explicit admin opt-in per namespace.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: restrict-template-egress
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   ["extensions.agents.x-k8s.io"]
        apiVersions: ["v1beta1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["sandboxtemplates"]
  validations:
    # Reject if any egress rule allows the IPv4 or IPv6 wildcard CIDR,
    # OR if the template would result in an implicit public-egress policy
    # being generated by the controller.
    #
    # Subtle K8s NetworkPolicy + SandboxTemplate semantics this expression
    # handles:
    #   1. Template has spec.networkPolicyManagement: Unmanaged → allow.
    #      The controller skips NetworkPolicy creation entirely; the
    #      operator has opted in to external policy enforcement (e.g. a
    #      CiliumNetworkPolicy), which is out of scope for this VAP.
    #   2. Template has spec.networkPolicyManagement: Managed (or omitted,
    #      since Managed is the +kubebuilder:default) AND no
    #      spec.networkPolicy → REJECT. Per the SandboxTemplate CRD
    #      (extensions/api/v1beta1/sandboxtemplate_types.go), the
    #      controller generates a "Secure Default" policy in this case
    #      whose egress permits the public internet (0.0.0.0/0 except
    #      RFC1918 + metadata server, plus ::/0). That is exactly what
    #      CUJ SAND-EGRESS-5 wants this VAP to block. Operators who want
    #      that posture must opt in explicitly by providing a
    #      networkPolicy with the same shape, or by setting
    #      networkPolicyManagement: Unmanaged.
    #   3. Template has networkPolicy but no egress field → allow. No
    #      egress rules, no public-egress problem.
    #   4. An egress rule has an absent or empty `to` field → REJECT.
    #      In K8s NetworkPolicy, an egress rule with no `to` matches ALL
    #      destinations. So "no to" is functionally identical to
    #      "to: 0.0.0.0/0" and must be blocked by this policy.
    #   5. A peer with no ipBlock → allow this peer (it's a podSelector /
    #      namespaceSelector, not a CIDR-based rule).
    - expression: >-
        (has(object.spec.networkPolicyManagement) &&
         object.spec.networkPolicyManagement == 'Unmanaged') ||
        (has(object.spec.networkPolicy) &&
         (!has(object.spec.networkPolicy.egress) ||
          object.spec.networkPolicy.egress.all(rule,
            has(rule.to) && size(rule.to) > 0 &&
            rule.to.all(peer,
              !has(peer.ipBlock) ||
              (peer.ipBlock.cidr != "0.0.0.0/0" && peer.ipBlock.cidr != "::/0")
            )
          )))
      message: >-
        SandboxTemplate egress is too permissive for this namespace.
        Either (a) provide spec.networkPolicy with restricted egress
        (no ipBlock 0.0.0.0/0 or ::/0, non-empty `to` on every rule)
        and route public-bound traffic through a forward proxy (see
        examples/policy/cilium/egress-gateway.yaml); or (b) set
        spec.networkPolicyManagement: Unmanaged and enforce egress with
        an external policy. Under the default Managed mode, omitting
        spec.networkPolicy causes the controller to generate a Secure
        Default with public-internet egress, which this policy blocks.
      reason: Forbidden

    # Alternative — uncomment and replace the rule above to allow 0.0.0.0/0
    # only when `except:` covers RFC1918 AND the cloud metadata server.
    # The CEL form is verbose but safe; it rejects the common "forgot the
    # metadata server" mistake.
    #
    # Note: the "no networkPolicy under Managed" rejection still applies
    # under this variant, even though the controller's auto-generated
    # Secure Default would itself pass — forcing the operator to be
    # explicit avoids any implicit Secure Default sneaking through
    # admission.
    #
    # - expression: >-
    #     (has(object.spec.networkPolicyManagement) &&
    #      object.spec.networkPolicyManagement == 'Unmanaged') ||
    #     (has(object.spec.networkPolicy) &&
    #      (!has(object.spec.networkPolicy.egress) ||
    #       object.spec.networkPolicy.egress.all(rule,
    #         !has(rule.to) ||
    #         rule.to.all(peer,
    #           !has(peer.ipBlock) ||
    #           (peer.ipBlock.cidr != "0.0.0.0/0" && peer.ipBlock.cidr != "::/0") ||
    #           (peer.ipBlock.cidr == "0.0.0.0/0" &&
    #              has(peer.ipBlock.except) &&
    #              "10.0.0.0/8"     in peer.ipBlock.except &&
    #              "172.16.0.0/12"  in peer.ipBlock.except &&
    #              "192.168.0.0/16" in peer.ipBlock.except &&
    #              "169.254.0.0/16" in peer.ipBlock.except)
    #         )
    #       )))
    #   message: "0.0.0.0/0 egress requires except: covering RFC1918 + metadata server (169.254.0.0/16); also disallows Managed + nil networkPolicy."
    #   reason: Forbidden
