# 1. sandbox-router Deployment in Tenant-A
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-router
  namespace: tenant-a
  labels:
    app: sandbox-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-router
  template:
    metadata:
      labels:
        app: sandbox-router
    spec:
      containers:
      - name: sandbox-router
        image: sandbox-router:latest
        imagePullPolicy: IfNotPresent
        args:
        - --http-bind-address=:8080
        - --health-probe-bind-address=:8081
        - --cluster-domain=cluster.local
        - --proxy-timeout=180s
        - --cache-enabled=false
        ports:
        - containerPort: 8080
          name: http
---
# 2. Service for sandbox-router in Tenant-A
apiVersion: v1
kind: Service
metadata:
  name: sandbox-router-svc
  namespace: tenant-a
spec:
  selector:
    app: sandbox-router
  ports:
  - port: 8080
    targetPort: 8080
---
# 3. Static Wildcard HTTPRoute referencing sandbox-router Service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tenant-a-sandboxes-route
  namespace: tenant-a
spec:
  parentRefs:
  - name: sandbox-edge-gateway
    namespace: envoy-gateway-system
  hostnames:
  - "*.tenant-a.sandbox.local"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    timeouts:
      request: 180s
    backendRefs:
    - name: sandbox-router-svc
      port: 8080
---
# 4. EnvoyExtensionPolicy attaching sandbox-gateway ext_proc callout engine in tenant-a
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: tenant-a-auto-resume-policy
  namespace: tenant-a
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: tenant-a-sandboxes-route
  extProc:
  - backendRefs:
    - name: sandbox-gateway-svc
      port: 50051
    messageTimeout: 180s
    failOpen: false
    processingMode:
      request: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-gateway-sa
  namespace: tenant-a
---
# 5. Tenant-A sandbox-gateway Callout Deployment (Pure gRPC Engine)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-gateway
  namespace: tenant-a
  labels:
    app: sandbox-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-gateway
  template:
    metadata:
      labels:
        app: sandbox-gateway
    spec:
      serviceAccountName: sandbox-gateway-sa
      containers:
      - name: sandbox-gateway
        image: sandbox-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
          name: grpc-ext-proc
        env:
        - name: PORT
          value: "50051"
        - name: MANAGER_ENDPOINT
          value: "http://sandbox-suspension-manager-svc.default.svc.cluster.local:8090/v1/sandboxes/resume"
---
# 6. Tenant-A sandbox-gateway gRPC Callout Service
apiVersion: v1
kind: Service
metadata:
  name: sandbox-gateway-svc
  namespace: tenant-a
spec:
  selector:
    app: sandbox-gateway
  ports:
  - name: grpc-ext-proc
    port: 50051
    targetPort: 50051
---
# 7. BackendTrafficPolicy setting 180s HTTP request timeout for tenant-a cold-starts
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: tenant-a-timeout-policy
  namespace: tenant-a
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: tenant-a-sandboxes-route
  timeout:
    http:
      requestTimeout: 180s



