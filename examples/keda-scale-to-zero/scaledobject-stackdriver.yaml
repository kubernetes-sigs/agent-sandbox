# Alternative to scaledobject-prometheus.yaml: scale on the SAME metric, but read it
# directly from Cloud Monitoring (Stackdriver) instead of the in-cluster GMP frontend.
#
# Trade-offs vs. the Prometheus option (see README):
#   + No GMP query frontend to deploy/maintain.
#   + Can also scale on native GCP metrics (Pub/Sub, load balancers, ...).
#   - KEDA must authenticate to GCP (Workload Identity, below).
#   - Higher latency (Cloud Monitoring ingestion delay).
#   - The gcp-stackdriver scaler is DEPRECATED in KEDA (still works, but frozen).
#
# Apply EITHER this file OR scaledobject-prometheus.yaml, not both.

# Lets the keda-operator authenticate to Cloud Monitoring using Workload Identity
# Federation for GKE. Bind roles/monitoring.viewer to the keda/keda-operator service
# account first (see the "Alternative: GCP Stackdriver scaler" section in the README).
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-trigger-auth-gcp-credentials
  namespace: keda-test
spec:
  podIdentity:
    provider: gcp
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: agent-warmpool-scaledobject
  namespace: keda-test # Namespace of the SandboxWarmPool
spec:
  scaleTargetRef:
    apiVersion: extensions.agents.x-k8s.io/v1beta1
    kind: SandboxWarmPool
    name: python-sdk-warmpool
  # True scale-to-zero. KEDA performs the 0 -> 1 activation itself and hands 1 -> N
  # to an HPA it manages.
  minReplicaCount: 0
  maxReplicaCount: 100 # Hard budget ceiling
  pollingInterval: 15
  cooldownPeriod: 60 # Seconds at/under the activation value before scaling back to 0.
  # Cloud Monitoring occasionally returns a transient "code = Internal" error on the rate
  # query. When that happens KEDA has no value and the HPA briefly shows the MinInt64
  # sentinel (-9223372036854775808m). This fallback serves a fixed replica count after a few
  # consecutive failures so the 1 -> N range stays stable through the blip.
  # NOTE: fallback applies only while already active (>= 1 replica); it does not cover the
  # scale-from-zero activation step.
  fallback:
    failureThreshold: 3 # consecutive failed polls before the fallback kicks in
    replicas: 5 # replica count served to the HPA while the scaler is failing
  triggers:
    - type: gcp-stackdriver
      authenticationRef:
        name: keda-trigger-auth-gcp-credentials
      metadata:
        # Replace with your GCP project ID.
        projectId: "PROJECT_ID"
        # The GMP-ingested Prometheus counter as it appears in Cloud Monitoring.
        filter: >-
          metric.type="prometheus.googleapis.com/agent_sandbox_claim_creation_total/counter"
          AND resource.type="prometheus_target"
          AND metric.labels.warmpool_name="python-sdk-warmpool"
        # Aggregate the counter into a per-second rate before it leaves Cloud Monitoring:
        # ALIGN_RATE over a 60s window, summed across the controller's time series.
        alignmentPeriodSeconds: "60"
        alignmentAligner: rate
        alignmentReducer: sum
        valueIfNull: "0.0"
        # 1 -> N scaling math: target 0.5 claims/sec per replica (matches the HPA example).
        targetValue: "0.2"
        # 0 <-> 1 gate: any real claim activity lifts the pool off zero.
        activationTargetValue: "0.01"
