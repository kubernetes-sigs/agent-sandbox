apiVersion: apps/v1
kind: Deployment
metadata:
  name: managed-sandbox-example-controller
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: managed-sandbox-example-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: managed-sandbox-example-controller
    spec:
      serviceAccountName: managed-sandbox-example-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: controller
        image: kind.local/managed-sandbox-controller:dev
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        args:
        - --pool-agent-image=kind.local/pod-agent:dev
        - --metrics-bind-address=:8080
        - --health-probe-bind-address=:8081
        ports:
        - name: metrics
          containerPort: 8080
        - name: health
          containerPort: 8081
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
