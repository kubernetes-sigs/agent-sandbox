apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: python-sandbox-template-2
  namespace: default
spec:
  podTemplate:
    metadata:
      labels:
        sandbox-type: python-runtime
    spec:
      runtimeClassName: gvisor # Required for sandbox isolation
      automountServiceAccountToken: false # Required security context
      securityContext:
        runAsNonRoot: true # Required
      nodeSelector:
        sandbox.gke.io/runtime: gvisor # Required
      tolerations:
      - key: "sandbox.gke.io/runtime"
        value: "gvisor"
        effect: "NoSchedule" # Required
      containers:
        # Container 1: The secure user Python execution environment
        - name: runtime
          image: registry.k8s.io/agent-sandbox/python-runtime-sandbox:v0.1.0
          ports:
            - containerPort: 8888
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi" # Required limit
          securityContext:
            capabilities:
              drop: ["ALL"] # Required drops
          volumeMounts:
            - name: shared-workspace
              mountPath: /workspace

        # Container 2: Our new gRPC Sandbox Daemon (Data Plane Sidecar)
        - name: sandbox-daemon
          image: us-central1-docker.pkg.dev/labolorunke-gke-dev/agentsandbox/agent-sandbox-agent:latest
          command: ["/bin/agent-sandbox-agent"]
          args: ["--port=50051"]
          ports:
            - containerPort: 50051
              name: grpc-port
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          env:
            - name: HOME
              value: /tmp
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: shared-workspace
              mountPath: /workspace

      restartPolicy: OnFailure
      volumes:
        - name: shared-workspace
          emptyDir: {}
