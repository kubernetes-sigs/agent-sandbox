apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: ts-sdk-test-template
spec:
  podTemplate:
    metadata:
      labels:
        app: typescript-sandbox
        sandbox: sdk-test-sandbox
    spec:
      containers:
      - name: typescript-sandbox
        image: {image_prefix}python-runtime-sandbox:{image_tag}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8888
        readinessProbe:
          httpGet:
            path: /
            port: 8888
          initialDelaySeconds: 0
          periodSeconds: 1
          failureThreshold: 30
          timeoutSeconds: 2
