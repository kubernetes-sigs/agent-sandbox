syntax = "proto3";

package filesystem.v1;

import "google/protobuf/timestamp.proto";

option go_package = "sigs.k8s.io/agent-sandbox/packages/sandboxd/spec/filesystem;filesystem";
option java_multiple_files = true;
option java_package = "io.sandboxd.packages.sandboxd.spec.filesystem";

enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_FILE = 1;
  FILE_TYPE_DIRECTORY = 2;
  FILE_TYPE_SYMLINK = 3;
}

service FilesystemService {
  rpc WriteFile(stream WriteFileRequest) returns (WriteFileResponse);
  rpc ReadFile(ReadFileRequest) returns (stream ReadFileResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc StatFile(StatFileRequest) returns (StatFileResponse);
  rpc MakeDir(MakeDirRequest) returns (MakeDirResponse);
  rpc Remove(RemoveRequest) returns (RemoveResponse);
}

message FileMetadata {
  string path = 1;
  optional uint32 mode = 2;
}

message WriteFileRequest {
  oneof payload {
    FileMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message ReadFileRequest {
  string path = 1;
}

message ReadFileResponse {
  bytes chunk = 1;
}

message ListFilesRequest {
  string path = 1;
}

message ListFilesResponse {
  repeated FileEntry entries = 1;
}

message FileEntry {
  string name = 1;
  FileType type = 2;
  int64 size = 3;
  google.protobuf.Timestamp mod_time = 4;
}

message StatFileRequest {
  string path = 1;
}

message StatFileResponse {
  string path = 1;
  FileType type = 2;
  int64 size = 3;
  google.protobuf.Timestamp mod_time = 4;
}

message MakeDirRequest {
  string path = 1;
}

message RemoveRequest {
  string path = 1;
  bool recursive = 2;
}

message WriteFileResponse {
}

message MakeDirResponse {
}

message RemoveResponse {
}

