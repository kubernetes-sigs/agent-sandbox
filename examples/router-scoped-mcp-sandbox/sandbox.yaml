apiVersion: agents.x-k8s.io/v1beta1
kind: Sandbox
metadata:
  name: box-a
spec:
  # No K8s credential in the pod at all — the agent's only credential is
  # the scoped token minted for this sandbox by mint-token, verified by
  # sandbox-router's --authz-mode=scoped-token. Nothing in this pod ever
  # needs to call the K8s API.
  podTemplate:
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mcp
        image: ${IMAGE}
        imagePullPolicy: IfNotPresent
        ports:
        - name: mcp
          containerPort: 8000
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: workspace
          mountPath: /workspace
        readinessProbe:
          # TCP, not httpGet: the streamable-http MCP endpoint answers a
          # plain GET (no SSE Accept header) with 406, which an HTTP
          # probe would count as failure forever.
          tcpSocket:
            port: mcp
          initialDelaySeconds: 2
          periodSeconds: 2
  volumeClaimTemplates:
  - metadata:
      name: workspace
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
