version: 2
updates:
  # Enable version updates for Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/dev/tools"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/examples/chrome-sandbox"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  - package-ecosystem: "gomod"
    directory: "/site"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
