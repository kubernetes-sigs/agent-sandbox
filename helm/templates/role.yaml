{{- if not .Values.controller.watchNamespace }}
{{/*
Webhook certificate management Role - only rendered in cluster-scoped mode.
Grants permissions to create and update the agent-sandbox-webhook-certs Secret
for self-signed certificate generation.
Not needed in namespaced mode where webhooks are disabled.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-sandbox-controller
  namespace: {{ include "agent-sandbox.namespace" . }}
  labels:
    {{- include "agent-sandbox.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
- apiGroups:
  - ""
  resourceNames:
  - agent-sandbox-webhook-certs
  resources:
  - secrets
  verbs:
  - get
  - patch
  - update
{{- end }}
