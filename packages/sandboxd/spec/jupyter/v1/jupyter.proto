syntax = "proto3";

package jupyter.v1;

option go_package = "sigs.k8s.io/agent-sandbox/packages/sandboxd/spec/jupyter;jupyter";
option java_multiple_files = true;
option java_package = "io.sandboxd.packages.sandboxd.spec.jupyter";

enum KernelStatus {
  KERNEL_STATUS_UNSPECIFIED = 0;
  KERNEL_STATUS_STARTING = 1;
  KERNEL_STATUS_IDLE = 2;
  KERNEL_STATUS_BUSY = 3;
  KERNEL_STATUS_ERROR = 4;
}

service Jupyter {
  rpc CreateSession(CreateJupyterSessionRequest) returns (JupyterSession);
  rpc ExecuteCode(ExecuteJupyterCodeRequest) returns (stream ExecuteJupyterCodeResponse);
}

message CreateJupyterSessionRequest {
  string kernel_name = 1;
}

message JupyterSession {
  string session_id = 1;
  KernelStatus status = 2;
}

message ExecuteJupyterCodeRequest {
  string session_id = 1;
  string code = 2;
}

message StreamEvent {
  string stdout = 1;
  string stderr = 2;
}

message StatusEvent {
  string status = 1;
}

message ExecuteJupyterCodeResponse {
  oneof event {
    StreamEvent stream = 1;
    JupyterOutput output = 2;
    StatusEvent status = 3;
  }
}

message JupyterOutput {
  string type = 1;
  bytes data = 2;
}
