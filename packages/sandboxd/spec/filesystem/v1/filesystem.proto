syntax = "proto3";

package filesystem.v1;

import "google/protobuf/timestamp.proto";

option go_package = "sigs.k8s.io/agent-sandbox/packages/sandboxd/spec/filesystem/v1;filesystemv1";
option java_multiple_files = true;
option java_package = "io.sandboxd.packages.sandboxd.spec.filesystem";

enum FileType {
  FILE_TYPE_UNSPECIFIED = 0;
  FILE_TYPE_FILE = 1;
  FILE_TYPE_DIRECTORY = 2;
  FILE_TYPE_SYMLINK = 3;
}

service FilesystemService {
  rpc Write(stream WriteRequest) returns (WriteResponse);
  rpc Read(ReadRequest) returns (stream ReadResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Stat(StatRequest) returns (StatResponse);
  rpc MakeDir(MakeDirRequest) returns (MakeDirResponse);
  rpc Remove(RemoveRequest) returns (RemoveResponse);
}

message FileMetadata {
  string path = 1;
  optional uint32 mode = 2;
}

message WriteRequest {
  oneof payload {
    FileMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message ReadRequest {
  string path = 1;
}

message ReadResponse {
  bytes chunk = 1;
}

message ListRequest {
  string path = 1;
}

message ListResponse {
  repeated FileEntry entries = 1;
}

message FileEntry {
  string name = 1;
  FileType type = 2;
  int64 size = 3;
  google.protobuf.Timestamp mod_time = 4;
}

message StatRequest {
  string path = 1;
}

message StatResponse {
  string path = 1;
  FileType type = 2;
  int64 size = 3;
  google.protobuf.Timestamp mod_time = 4;
}

message MakeDirRequest {
  string path = 1;
}

message RemoveRequest {
  string path = 1;
  bool recursive = 2;
}

message WriteResponse {
}

message MakeDirResponse {
}

message RemoveResponse {
}
