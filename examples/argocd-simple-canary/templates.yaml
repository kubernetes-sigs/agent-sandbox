# This file defines the SandboxTemplates used by the warm pools.
apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxTemplate
metadata:
  name: sandbox-python-template-v1
  namespace: default
spec:
  podTemplate:
    spec:
      containers:
      - name: python-runtime
        image: ${IMAGE}
        command: ["python3", "-m", "http.server", "8888"]
        ports:
        - containerPort: 8888
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
---
