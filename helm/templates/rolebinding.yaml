{{- if not .Values.controller.watchNamespace }}
{{/*
Webhook certificate management RoleBinding - only rendered in cluster-scoped mode.
Binds the webhook cert Secret permissions to the controller ServiceAccount.
Not needed in namespaced mode where webhooks are disabled.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-sandbox-controller
  namespace: {{ include "agent-sandbox.namespace" . }}
  labels:
    {{- include "agent-sandbox.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: agent-sandbox-controller
  namespace: {{ include "agent-sandbox.namespace" . }}
roleRef:
  kind: Role
  name: agent-sandbox-controller
  apiGroup: rbac.authorization.k8s.io
{{- end }}
