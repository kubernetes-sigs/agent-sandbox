apiVersion: extensions.agents.x-k8s.io/v1beta1
kind: SandboxWarmPool
metadata:
  name: python-sdk-warmpool
  namespace: keda-test
  labels:
    app: python-sdk-warmpool
spec:
  # Start at 0: KEDA owns this field via the /scale subresource and will drive it
  # between 0 and maxReplicaCount. 0 reflects the scaled-to-zero rest state.
  replicas: 0
  sandboxTemplateRef:
    name: python-sandbox-template
