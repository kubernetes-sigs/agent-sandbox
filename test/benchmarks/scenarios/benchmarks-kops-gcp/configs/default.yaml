# Default benchmark cluster shape: matches the original monolithic run script (1 control-plane + 3 nodes, all n2-standard-8).
#
# GENERATED by configs/regenerate using `kops create cluster --dry-run -o yaml`
# (see that script for the exact flags and post-processing edits). Do not
# hand-tune spec defaults here — regenerate instead, then review the diff.
#
# WARNING: kubernetesApiAccess and sshAccess below are the kOps defaults and
# expose the API server and SSH to the entire internet (0.0.0.0/0, ::/0).
# That is an accepted trade-off for short-lived benchmark clusters in
# disposable CI projects; do NOT reuse this manifest for anything long-lived
# without restricting those CIDRs.
apiVersion: kops.k8s.io/v1alpha2
kind: Cluster
metadata:
  name: sandbox-benchmark-default
spec:
  api:
    loadBalancer:
      type: Public
  authorization:
    rbac: {}
  channel: stable
  cloudConfig:
    gceServiceAccount: default
  cloudProvider: gce
  etcdClusters:
  - cpuRequest: 200m
    etcdMembers:
    - instanceGroup: control-plane-us-central1-a
      name: a
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: main
  - cpuRequest: 100m
    etcdMembers:
    - instanceGroup: control-plane-us-central1-a
      name: a
    manager:
      backupRetentionDays: 90
    memoryRequest: 100Mi
    name: events
  iam:
    allowContainerRegistry: true
    legacy: false
  kubelet:
    anonymousAuth: false
  kubernetesApiAccess:
  - 0.0.0.0/0
  - ::/0
  networking:
    cilium: {}
  nonMasqueradeCIDR: 100.64.0.0/10
  project: PLACEHOLDER_PROJECT # replaced by create-cluster before `kops create -f`
  sshAccess:
  - 0.0.0.0/0
  - ::/0
  subnets:
  - cidr: 10.0.16.0/20
    name: us-central1
    region: us-central1
    type: Public
  topology:
    dns:
      type: None

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: sandbox-benchmark-default
  name: control-plane-us-central1-a
spec:
  machineType: n2-standard-8
  maxSize: 1
  minSize: 1
  role: Master
  subnets:
  - us-central1
  zones:
  - us-central1-a

---

apiVersion: kops.k8s.io/v1alpha2
kind: InstanceGroup
metadata:
  labels:
    kops.k8s.io/cluster: sandbox-benchmark-default
  name: nodes-us-central1-a
spec:
  machineType: n2-standard-8
  maxSize: 3
  minSize: 3
  role: Node
  subnets:
  - us-central1
  zones:
  - us-central1-a
