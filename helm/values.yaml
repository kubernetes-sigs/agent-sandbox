namespace:
  # create controls whether the namespace is created by this chart.
  create: true
  name: agent-sandbox-system

image:
  repository: registry.k8s.io/agent-sandbox/agent-sandbox-controller
  tag: ""  # required, eg. v0.3.10
  pullPolicy: IfNotPresent

replicaCount: 1

# podAnnotations are added to the controller pod template.
# Useful for service-mesh sidecar injection toggles, Prometheus scrape
# autodiscovery (e.g. Datadog `ad.datadoghq.com/...`), or any platform-
# specific pod-level annotation.
podAnnotations: {}
  # ad.datadoghq.com/agent-sandbox-controller.check_names: '["openmetrics"]'
  # ad.datadoghq.com/agent-sandbox-controller.init_configs: '[{}]'
  # ad.datadoghq.com/agent-sandbox-controller.instances: |
  #   [{"openmetrics_endpoint": "http://%%host%%:8080/metrics", "namespace": "agent_sandbox", "metrics": [".*"]}]

# podLabels are added to the controller pod template, in addition to
# the chart's selector labels. Useful for cost-allocation labels,
# network policy selectors, or pod-level metadata.
podLabels: {}
  # team: platform

controller:
  ##### Unset flags are omitted
  # clusterDomain: "cluster.local"
  leaderElect: true
  # leaderElectionNamespace: ""
  extensions: false
  # enableTracing: false
  # enablePprof: false
  # enablePprofDebug: false
  # pprofBlockProfileRate: 1000000
  # pprofMutexProfileFraction: 10
  # kubeApiQps: -1.0
  # kubeApiBurst: 10
  # sandboxConcurrentWorkers: 1
  ##### The following workers are only active when controller.extensions=true.
  # sandboxClaimConcurrentWorkers: 1
  # sandboxWarmPoolConcurrentWorkers: 1
  # sandboxTemplateConcurrentWorkers: 1
  ##### extraArgs passes additional flags not listed above (e.g. zap logging flags).
  extraArgs: []

resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 128Mi
  # requests:
  #   cpu: 10m
  #   memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Pod-level securityContext (spec.template.spec.securityContext). Default null — omitted unless set.
# Example for Kyverno / restricted Pod Security:
# podSecurityContext:
#   runAsNonRoot: true
#   seccompProfile:
#     type: RuntimeDefault
podSecurityContext: null

# Container-level securityContext for the controller. Default null — omitted unless set.
# Example:
# containerSecurityContext:
#   allowPrivilegeEscalation: false
#   capabilities:
#     drop:
#       - ALL
#   runAsNonRoot: true
#   seccompProfile:
#     type: RuntimeDefault
containerSecurityContext: null

# migration controls the v1alpha1 -> v1beta1 upgrade hooks (bootstrap +
# storage rewrite). Set enabled: false on fresh installs and clusters that
# have already been migrated, to skip the Jobs entirely.
#
# The Jobs run only at `helm upgrade` time (NOT on initial install), so a
# `helm install` of this chart never triggers migration regardless of this
# setting. The setting exists so operators can also opt out of migration
# during an upgrade (e.g., to run dev/tools/migrate.sh manually instead).
migration:
  enabled: true

  # Container image used by both the bootstrap and rewrite Jobs. Needs
  # bash + kubectl. bitnami/kubectl bundles both, but note Bitnami
  # restricted their public Docker Hub catalog in 2025 - if your registry
  # policy or rate-limiting blocks docker.io, mirror this image into a
  # registry you control, or substitute a minimal kubectl+bash image of
  # your own (registry.k8s.io/kubectl is distroless and lacks bash, so
  # cannot be used as a drop-in). For reproducibility under upgrades,
  # pin by digest:
  #   image: bitnami/kubectl@sha256:<digest>
  image: bitnami/kubectl:1.30

  # Resource requests/limits for the migration Job pods. Defaults are
  # conservative; bump if you have very large clusters (thousands of
  # SandboxClaims) and the script needs more memory.
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

  # Name of the conversion webhook Service the post-upgrade Job waits for
  # before starting the storage rewrite. Override if your install uses a
  # non-default webhook Service name (e.g. a multi-tenant install with a
  # renamed webhook).
  webhookServiceName: agent-sandbox-webhook-service
